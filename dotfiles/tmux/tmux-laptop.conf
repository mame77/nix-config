# default
set -g prefix C-SPACE
set -g base-index 1
set -g mode-keys vi
set -g default-terminal "xterm-ghostty"
set -as terminal-overrides ",xterm-256color:RGB"
# display
set -g status-position top
set -g status-justify absolute-centre
set -g status-right ''
set -g status-left '#[fg=#f38ba8]#S '
set -g status-left-length 30
set -g pane-active-border-style "fg=red"
set -g status-style "bg=default"
set -g window-status-style "bg=default,fg=colour250"
set -g window-status-current-style "bg=default,fg=#f38ba8"
# keymap
bind-key h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind-key j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind-key l if -F '#{pane_at_right}'  '' 'select-pane -R'

bind H resize-pane -L 5
bind L resize-pane -R 5
bind Enter copy-mode

bind v new-window -c "#{pane_current_path}"
bind u split-window -h -l 50% -c "#{pane_current_path}"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind g popup -d "#{pane_current_path}" -E -w 100% -h 100% "lazygit"
# devctl popup writes the selected path to a temp file, then cd's the original pane.
bind s popup -d "#{pane_current_path}" -E -w 100% -h 100% "lazysql"
bind d run-shell 'pane="#{pane_id}"; tmp="/tmp/devctl-cwd-${pane#%}"; rm -f "$tmp"; tmux display-popup -d "#{pane_current_path}" -E -w 100% -h 100% "/home/mame/go/bin/devctl --cwd-file \"$tmp\""; if [ -s "$tmp" ]; then tmux send-keys -t "$pane" C-x C-d; else rm -f "$tmp"; fi'
